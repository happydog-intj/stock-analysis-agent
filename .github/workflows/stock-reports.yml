name: 📊 Stock Reports (汇量科技 1860.HK)

on:
  schedule:
    # HKT = UTC+8，港股交易日 Mon-Fri
    - cron: '0 1 * * 1-5'   # 09:00 HKT 晨报
    - cron: '0 4 * * 1-5'   # 12:00 HKT 午报
    - cron: '0 7 * * 1-5'   # 15:00 HKT 收盘报

  workflow_dispatch:
    inputs:
      period:
        description: '手动指定报告类型'
        required: true
        default: morning
        type: choice
        options:
          - morning
          - noon
          - close

jobs:
  report:
    name: Generate & Push Report
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      issues: write
      contents: read

    steps:
      # ── 1. 检出代码 ──────────────────────────────────────────
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      # ── 2. Python 环境 ───────────────────────────────────────
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 3. 判断当前应执行哪个报告 ─────────────────────────────
      - name: 🕐 Determine report period
        id: period
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "PERIOD=${{ inputs.period }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            case $HOUR in
              01) PERIOD=morning ;;
              04) PERIOD=noon    ;;
              07) PERIOD=close   ;;
              *)  PERIOD=morning ;;
            esac
            echo "PERIOD=$PERIOD" >> $GITHUB_OUTPUT
          fi

      # ── 4. 执行报告任务 ──────────────────────────────────────
      - name: 📊 Run ${{ steps.period.outputs.PERIOD }} report
        run: python scripts/run_job.py ${{ steps.period.outputs.PERIOD }}
        env:
          # ── LLM ───────────────────────────────────────────────
          LLM_PROVIDER:          ${{ secrets.LLM_PROVIDER || 'glm' }}
          LLM_MODEL:             ${{ secrets.LLM_MODEL || '' }}
          CLAUDE_API_KEY:        ${{ secrets.CLAUDE_API_KEY }}
          QWEN_API_KEY:          ${{ secrets.QWEN_API_KEY }}
          KIMI_API_KEY:          ${{ secrets.KIMI_API_KEY }}
          GLM_API_KEY:           ${{ secrets.GLM_API_KEY }}
          MINIMAX_API_KEY:       ${{ secrets.MINIMAX_API_KEY }}
          # ── 数据源 ────────────────────────────────────────────
          FEISHU_WEBHOOK:        ${{ secrets.FEISHU_WEBHOOK }}
          REDDIT_CLIENT_ID:      ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:  ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME:       ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD:       ${{ secrets.REDDIT_PASSWORD }}
          XUEQIU_COOKIES:        ${{ vars.XUEQIU_COOKIES }}
          LOG_LEVEL:             INFO

      # ── 6. 创建 GitHub Issue 报告 ────────────────────────────
      - name: 📝 Create GitHub Issue
        id: create_issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PERIOD="${{ steps.period.outputs.PERIOD }}"
          DATE=$(TZ='Asia/Hong_Kong' date +"%Y-%m-%d")
          case "$PERIOD" in
            morning) LABEL="晨报 🌅" ;;
            noon)    LABEL="午报 ☀️" ;;
            close)   LABEL="收盘报 🌙" ;;
            *)       LABEL="$PERIOD" ;;
          esac
          TITLE="📊 汇量科技 1860.HK ${LABEL} ${DATE}"
          gh label create "report" --color "#0075ca" --description "自动生成的股票报告" --repo ${{ github.repository }} 2>/dev/null || true
          if ! ISSUE_URL=$(gh issue create --title "$TITLE" --body-file report_output.md --label "report" --repo ${{ github.repository }}); then
            ISSUE_URL=$(gh issue create --title "$TITLE" --body-file report_output.md --repo ${{ github.repository }})
          fi
          echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT
          echo "$ISSUE_URL" > issue_url.txt

      # ── 7. Telegram 通知 ─────────────────────────────────────
      - name: 📬 Send Telegram notification
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          PERIOD="${{ steps.period.outputs.PERIOD }}"
          DATE=$(TZ='Asia/Hong_Kong' date +"%Y-%m-%d")
          ISSUE_URL=$(cat issue_url.txt 2>/dev/null || echo "")
          case "$PERIOD" in
            morning) PERIOD_LABEL="晨报 🌅" ;;
            noon)    PERIOD_LABEL="午报 ☀️" ;;
            close)   PERIOD_LABEL="收盘报 🌙" ;;
            *)       PERIOD_LABEL="$PERIOD" ;;
          esac

          # 从 report_output.md 提取关键数字
          PRICE=$(grep -oP '最新价 \| \K[0-9.]+' report_output.md | head -1 || echo "N/A")
          CHANGE=$(grep -oP '涨跌幅 \| \K[^|]+' report_output.md | head -1 | tr -d ' ' || echo "N/A")

          MESSAGE="📊 <b>汇量科技 1860.HK ${PERIOD_LABEL}</b>%0A"
          MESSAGE="${MESSAGE}📅 ${DATE}%0A%0A"
          MESSAGE="${MESSAGE}💹 现价: <b>${PRICE} HKD</b>%0A"
          MESSAGE="${MESSAGE}📈 涨跌幅: ${CHANGE}%0A"
          if [ -n "$ISSUE_URL" ]; then
            MESSAGE="${MESSAGE}%0A🔗 <a href='${ISSUE_URL}'>查看完整报告</a>"
          fi

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=7585470903" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true"

      # ── 8. 上传日志（失败时保留） ─────────────────────────────
      - name: 📁 Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-${{ steps.period.outputs.PERIOD }}-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
