name: 📊 Stock Reports (汇量科技 1860.HK)

on:
  schedule:
    # HKT = UTC+8，港股交易日 Mon-Fri
    - cron: '0 1 * * 1-5'   # 09:00 HKT 晨报
    - cron: '0 4 * * 1-5'   # 12:00 HKT 午报
    - cron: '0 7 * * 1-5'   # 15:00 HKT 收盘报

  workflow_dispatch:
    inputs:
      period:
        description: '手动指定报告类型'
        required: true
        default: morning
        type: choice
        options:
          - morning
          - noon
          - close

jobs:
  report:
    name: Generate & Push Report
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. 检出代码 ──────────────────────────────────────────
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      # ── 2. Python 环境 ───────────────────────────────────────
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 3. Playwright 浏览器（用于雪球爬虫）──────────────────
      - name: 🌐 Install Playwright browsers
        run: playwright install chromium --with-deps

      # ── 4. 判断当前应执行哪个报告 ─────────────────────────────
      - name: 🕐 Determine report period
        id: period
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "PERIOD=${{ inputs.period }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            case $HOUR in
              01) PERIOD=morning ;;
              04) PERIOD=noon    ;;
              07) PERIOD=close   ;;
              *)  PERIOD=morning ;;
            esac
            echo "PERIOD=$PERIOD" >> $GITHUB_OUTPUT
          fi

      # ── 5. 执行报告任务 ──────────────────────────────────────
      - name: 📊 Run ${{ steps.period.outputs.PERIOD }} report
        run: python scripts/run_job.py ${{ steps.period.outputs.PERIOD }}
        env:
          # ── LLM ───────────────────────────────────────────────
          LLM_PROVIDER:          ${{ secrets.LLM_PROVIDER || 'glm' }}
          LLM_MODEL:             ${{ secrets.LLM_MODEL || '' }}
          CLAUDE_API_KEY:        ${{ secrets.CLAUDE_API_KEY }}
          QWEN_API_KEY:          ${{ secrets.QWEN_API_KEY }}
          KIMI_API_KEY:          ${{ secrets.KIMI_API_KEY }}
          GLM_API_KEY:           ${{ secrets.GLM_API_KEY }}
          MINIMAX_API_KEY:       ${{ secrets.MINIMAX_API_KEY }}
          # ── 数据源 ────────────────────────────────────────────
          FEISHU_WEBHOOK:        ${{ secrets.FEISHU_WEBHOOK }}
          REDDIT_CLIENT_ID:      ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:  ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME:       ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD:       ${{ secrets.REDDIT_PASSWORD }}
          XUEQIU_COOKIES:        ${{ secrets.XUEQIU_COOKIES }}
          LOG_LEVEL:             INFO

      # ── 6. 创建 GitHub Issue 报告 ────────────────────────────
      - name: 📝 Create GitHub Issue
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PERIOD="${{ steps.period.outputs.PERIOD }}"
          DATE=$(TZ='Asia/Hong_Kong' date +"%Y-%m-%d")
          case "$PERIOD" in
            morning) LABEL="晨报 🌅" ;;
            noon)    LABEL="午报 ☀️" ;;
            close)   LABEL="收盘报 🌙" ;;
            *)       LABEL="$PERIOD" ;;
          esac
          TITLE="📊 汇量科技 1860.HK ${LABEL} ${DATE}"
          # 确保 report label 存在（首次创建，已存在时忽略错误）
          gh label create "report" --color "#0075ca" --description "自动生成的股票报告" --repo ${{ github.repository }} 2>/dev/null || true
          # 创建 Issue（带 label 失败则不带 label 重试）
          if ! gh issue create --title "$TITLE" --body-file report_output.md --label "report" --repo ${{ github.repository }}; then
            gh issue create --title "$TITLE" --body-file report_output.md --repo ${{ github.repository }}
          fi

      # ── 7. 上传日志（失败时保留） ─────────────────────────────
      - name: 📁 Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-${{ steps.period.outputs.PERIOD }}-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
